<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅遊行程導航</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #4fc3f7;
    --ocean: #0277bd;
    --coral: #ff7043;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --card-bg: #ffffffee;
    --shadow: 0 4px 20px rgba(2,119,189,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(160deg, #e0f7fa 0%, #b3e5fc 40%, #e8f5e9 100%);
    min-height: 100vh;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed; top: -80px; right: -80px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, #fff9c4aa 0%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; bottom: -60px; left: -60px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, #b2dfdbaa 0%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: 0;
  }

  /* ── Header ── */
  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 32px 20px 16px;
  }
  .header-icon {
    font-size: 44px; display: block;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  header h1 {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(20px, 5vw, 30px);
    font-weight: 800; color: var(--ocean);
    letter-spacing: 1px; margin-top: 4px;
  }
  header p { color: var(--text-light); font-size: 12px; margin-top: 4px; }

  /* ── Day Tabs ── */
  .day-tabs {
    position: relative; z-index: 1;
    max-width: 600px; margin: 0 auto 4px;
    padding: 0 16px;
    display: flex; gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .day-tab {
    flex: 1; min-width: 100px; max-width: 180px;
    padding: 10px 14px;
    border: 2px solid #b3e5fc;
    border-radius: 14px;
    background: var(--card-bg);
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--ocean);
    cursor: pointer;
    text-align: center;
    box-shadow: var(--shadow);
    transition: all 0.18s;
    line-height: 1.3;
  }
  .day-tab:hover {
    background: #e0f7fa;
    border-color: var(--sky);
    transform: translateY(-2px);
  }
  .day-tab.active {
    background: linear-gradient(135deg, var(--sky), var(--ocean));
    border-color: transparent;
    color: white;
    box-shadow: 0 4px 14px rgba(2,119,189,0.35);
    transform: translateY(-2px);
  }
  .day-tab .tab-date { font-size: 13px; opacity: 0.85; }
  .day-tab.skeleton { background: #e0f0fa; border-color: #cce; color: #aac; cursor: default; }

  /* ── Status ── */
  .status {
    position: relative; z-index: 1;
    text-align: center; padding: 8px 16px;
    font-size: 13px; color: var(--text-light); min-height: 32px;
  }
  .status.error { color: var(--coral); font-weight: 600; }
  .status.loading { color: var(--ocean); }

  .spinner {
    display: inline-block; width: 15px; height: 15px;
    border: 3px solid #b3e5fc; border-top-color: var(--ocean);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Content ── */
  .content {
    position: relative; z-index: 1;
    flex: 1;
    max-width: 600px; width: 100%;
    margin: 0 auto; padding: 8px 16px 16px;
  }

  /* ── Cards ── */
  .place-card {
    background: var(--card-bg); border-radius: 16px;
    padding: 15px 18px; box-shadow: var(--shadow);
    color: inherit;
    display: flex; align-items: center; gap: 14px;
    transition: transform 0.18s, box-shadow 0.18s;
    border: 2px solid transparent;
    margin-bottom: 10px;
    animation: slideUp 0.35s ease both;
  }
  .place-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(2,119,189,0.2);
    border-color: var(--sky);
  }
  .place-card:active { transform: scale(0.98); }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-icon {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(135deg, #e0f7fa, #b3e5fc);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(2,119,189,0.12);
  }
  .card-body { flex: 1; min-width: 0; }
  .card-place {
    font-size: 15px; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-note {
    font-size: 12px; color: var(--text-light); margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-actions {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .card-action {
    width: 40px; height: 40px;
    border: none; border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
    box-shadow: 0 2px 8px rgba(2,119,189,0.14);
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .card-action:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(2,119,189,0.18);
  }
  .card-action:active { transform: scale(0.96); }
  .card-action.nav {
    background: linear-gradient(135deg, var(--sky), var(--ocean));
    color: white;
  }
  .card-action.expense {
    background: #e8f5e9;
    color: #2e7d32;
  }

  /* ── Bottom config ── */
  .bottom-bar {
    position: relative; z-index: 1;
    max-width: 600px; margin: 0 auto; padding: 0 16px 28px;
  }
  .bottom-card {
    background: #ffffffcc; border-radius: 14px;
    padding: 12px 16px; box-shadow: var(--shadow);
    display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
  }
  .bottom-card label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--ocean); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .bottom-card input {
    flex: 1; min-width: 160px;
    padding: 7px 11px; border: 2px solid #b3e5fc; border-radius: 10px;
    font-size: 12px; font-family: 'Noto Sans TC', sans-serif;
    color: var(--text); background: #f0faff; outline: none;
    transition: border-color 0.2s;
  }
  .bottom-card input:focus { border-color: var(--sky); }
  .reload-btn {
    background: linear-gradient(135deg, var(--sky), var(--ocean));
    color: white; border: none; padding: 8px 18px;
    border-radius: 10px; font-size: 13px; font-weight: 700;
    font-family: 'Nunito', sans-serif; cursor: pointer;
    box-shadow: 0 3px 10px rgba(2,119,189,0.3);
    transition: transform 0.15s; white-space: nowrap;
  }
  .reload-btn:hover { transform: translateY(-2px); }

  .empty-msg {
    text-align: center; padding: 40px 20px;
    color: var(--text-light); font-size: 14px;
  }
  .empty-msg .e { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ── Ripple effect ── */
  .place-card .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(79, 195, 247, 0.35);
    transform: scale(0);
    animation: ripple-anim 0.6s linear;
    pointer-events: none;
  }
  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }

  /* ── Expense badge ── */
  .card-expense {
    font-size: 12px; color: #2e7d32; font-weight: 700; margin-top: 3px;
  }
  .card-expense::before { content: '💰 $'; }

  /* ── Expense modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.45);
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: white; border-radius: 20px;
    padding: 24px 22px; width: 88%; max-width: 360px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.88); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .modal-title { font-size: 15px; font-weight: 700; color: var(--ocean); margin-bottom: 4px; }
  .modal-place { font-size: 13px; color: var(--text-light); margin-bottom: 16px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modal-input-wrap {
    display: flex; align-items: center;
    border: 2px solid #b3e5fc; border-radius: 12px;
    overflow: hidden; margin-bottom: 16px;
  }
  .modal-input-wrap span {
    min-width: 48px;
    padding: 10px 14px; background: #f0faff;
    font-size: 22px; line-height: 1; font-weight: 800; color: var(--ocean);
    border-right: 2px solid #b3e5fc; user-select: none;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-input-wrap input {
    flex: 1; border: none; outline: none;
    padding: 10px 12px; font-size: 20px; font-weight: 700;
    font-family: 'Nunito', sans-serif; color: var(--text);
  }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1; padding: 10px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; transition: transform 0.12s;
  }
  .modal-btn:active { transform: scale(0.96); }
  .modal-btn.cancel { background: #f0f4f8; color: var(--text-light); }
  .modal-btn.confirm {
    background: linear-gradient(135deg, var(--sky), var(--ocean));
    color: white; box-shadow: 0 3px 10px rgba(2,119,189,0.3);
  }
  .modal-btn.clear { background: #fff0ee; color: var(--coral); flex: 0 0 auto; padding: 10px 16px; }

  /* ── Summary panel ── */
  .summary-bar {
    position: relative; z-index: 1;
    max-width: 600px; margin: 0 auto; padding: 0 16px 12px;
  }
  .summary-toggle {
    width: 100%; padding: 10px 16px;
    background: var(--card-bg); border: 2px solid #b3e5fc;
    border-radius: 12px; font-size: 14px; font-weight: 700;
    color: var(--ocean); cursor: pointer; box-shadow: var(--shadow);
    font-family: 'Noto Sans TC', sans-serif; transition: background 0.15s;
    text-align: left;
  }
  .summary-toggle:hover { background: #e8f7ff; }
  .summary-panel {
    display: none; margin-top: 10px;
    background: var(--card-bg); border-radius: 14px;
    box-shadow: var(--shadow); overflow: hidden;
  }
  .summary-panel.open { display: block; }
  .summary-panel table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .summary-panel th {
    background: linear-gradient(135deg, var(--sky), var(--ocean));
    color: white; padding: 9px 12px; text-align: left; font-weight: 700;
  }
  .summary-panel td { padding: 9px 12px; border-bottom: 1px solid #e8f4fb; }
  .summary-panel tr:last-child td { border-bottom: none; }
  .summary-panel tr:hover td { background: #f0faff; }
  .summary-day-row td { background: #e0f7fa; font-weight: 700; color: var(--ocean); font-size: 12px; }
  .summary-total td { background: #e8f5e9; font-weight: 800; color: #2e7d32; font-size: 14px; }
  .expense-val { color: #2e7d32; font-weight: 700; }
  .no-expense { color: #ccc; }
  .summary-actions { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #e8f4fb; }
  .summary-act-btn {
    flex: 1; padding: 9px; border: none; border-radius: 10px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; transition: transform 0.12s;
  }
  .summary-act-btn:active { transform: scale(0.96); }
  .btn-copy {
    background: linear-gradient(135deg, var(--sky), var(--ocean));
    color: white; box-shadow: 0 2px 8px rgba(2,119,189,0.25);
  }
  .btn-clear-all { background: #fff0ee; color: var(--coral); }
  .place-card { position: relative; }
  .place-card.visited {
    opacity: 0.42;
    filter: grayscale(55%);
    background: #dce8f0ee;
  }
  .place-card.visited .card-place {
    text-decoration: line-through;
    color: var(--text-light);
  }
  .visited-check {
    position: absolute; right: 108px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px; color: #66bb6a; font-weight: 900;
  }
</style>
</head>
<body>

<header>
  <span class="header-icon">🚗</span>
  <h1>旅遊行程導航</h1>
  <p>使用卡片右側按鈕進行導航或記帳</p>
</header>

<!-- Day Tabs (populated after load) -->
<div class="day-tabs" id="dayTabs">
  <div class="day-tab skeleton">載入中...</div>
</div>

<div class="status" id="status"></div>

<div class="content" id="content"></div>

<!-- Expense modal -->
<div class="modal-overlay" id="expenseModal">
  <div class="modal-box">
    <div class="modal-title">💰 輸入花費</div>
    <div class="modal-place" id="modalPlaceName"></div>
    <div class="modal-input-wrap">
      <span>$</span>
      <input type="number" id="expenseInput" placeholder="0" min="0" inputmode="numeric">
    </div>
    <div class="modal-btns">
      <button class="modal-btn clear" onclick="clearExpense()">清除</button>
      <button class="modal-btn cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn confirm" onclick="confirmExpense()">確認</button>
    </div>
  </div>
</div>

<!-- Expense summary -->
<div class="summary-bar">
  <button class="summary-toggle" id="summaryToggle" onclick="toggleSummary()">📊 花費總覽　<span id="summaryTotalBadge" style="float:right;color:#2e7d32"></span></button>
  <div class="summary-panel" id="summaryPanel"></div>
</div>

<!-- Sheet ID at bottom -->
<div class="bottom-bar">
  <div class="bottom-card">
    <div style="flex:1; min-width:160px;">
      <label>試算表 ID</label>
      <input type="text" id="sheetId" value="1Ui5PbkexOcy7Y6p-X-XX3aAQCmuh16W9aiWWm5HqQJA" placeholder="Google 試算表 ID">
    </div>
    <button class="reload-btn" onclick="loadSheet()">🔄 重新載入</button>
  </div>
</div>

<script>
// 關鍵字對應圖示（依序比對，第一個命中即採用）
const ICON_RULES = [
  // 餐飲
  { keys: ['早餐','早點','早午餐'], icon: '🍳' },
  { keys: ['午餐','中餐'], icon: '🍱' },
  { keys: ['晚餐','晚點'], icon: '🍽️' },
  { keys: ['餐廳','餐館','小吃','豆腐','海鮮','滷肉','牛肉','火鍋','燒烤','壽司','拉麵','麵','飯館','食堂','茶館','咖啡','甜點','飲料','冰淇淋','刨冰','卜肉','小館'], icon: '🍽️' },
  { keys: ['超商','超市','便利','全家','萊爾富'], icon: '🏪' },
  { keys: ['牛排'], icon: '🥩' },
  { keys: ['烤雞'], icon: '🍗' },
  // 住宿
  { keys: ['民宿','飯店','旅館','旅宿','住宿','check in','check-in','入住','hotel'], icon: '🏘️' },
  { keys: ['回家'], icon: '🏠' },
  // 交通休息
  { keys: ['休息站','服務區'], icon: '🛣️' },
  { keys: ['停車','車站','火車','高鐵','捷運','機場'], icon: '🚂' },
  // 自然景觀
  { keys: ['地熱'], icon: '♨️' },
  { keys: ['水產'], icon: '🐟' },
  { keys: ['冬山河'], icon: '🏞️' },
  { keys: ['森林','林場','林業','竹林','樹'], icon: '🌲' },
  { keys: ['公園','生態','綠地','綠洲','植物園'], icon: '🌿' },
  { keys: ['海','港','漁','沙灘','海岸','海邊','潮','礁'], icon: '🌊' },
  { keys: ['湖','潭','水庫','溪','瀑布','溫泉','泡湯','浴'], icon: '🏞️' },
  { keys: ['山','嶺','峰','步道','登山','健行'], icon: '🌾' },
  { keys: ['農場','農業','果園','採果','採草莓','牧場','田園'], icon: '🐑' },
  { keys: ['花','賞花','花園','玫瑰','薰衣草'], icon: '🌸' },
  { keys: ['鳥'], icon: '🐣' },
  { keys: ['林鐵'], icon: '🛤️' },
  { keys: ['三星青蔥'], icon: '🥬' },
  { keys: ['綠色'], icon: '🍀' },
  // 文化歷史
  { keys: ['廟','寺','宮','神社','教堂','佛'], icon: '⛩️' },
  { keys: ['古蹟','老街','歷史','傳統','文物','博物館','紀念館'], icon: '🏛️' },
  { keys: ['創意','園區','藝文','美術','藝術'], icon: '📜' },
  { keys: ['夜市','市集','市場'], icon: '🏮' },
  // 娛樂活動
  { keys: ['遊樂','樂園','主題'], icon: '🎠' },
  { keys: ['滑','溜','漂流','泛舟','衝浪','獨木舟'], icon: '🏄' },
  { keys: ['腳踏車','單車','自行車'], icon: '🚴' },
  { keys: ['觀光','展望','景觀台','瞭望'], icon: '🔭' },
  // 購物
  { keys: ['購物','商場','百貨'], icon: '🛍️' },
  { keys: ['全聯'], icon: '🛒' },
  // 預設
  { keys: [], icon: '📍' },
];

function getIcon(name) {
  const n = (name || '').toLowerCase();
  for (const rule of ICON_RULES) {
    if (rule.keys.length === 0) return rule.icon;
    if (rule.keys.some(k => n.includes(k.toLowerCase()))) return rule.icon;
  }
  return '📍';
}

// 每天欄位：[景點, 導航(停車), 品項]
const DAY_COLS = [
  { place: 0, nav: 1, note: 2 },  // A, B, C
  { place: 4, nav: 5, note: 6 },  // E, F, G
  { place: 8, nav: 9, note: 10 }, // I, J, K
];

let allDays = [];
let activeDay = 0;

// ── 當日自動對應 ──
// 把日期字串正規化成 M/D，方便比對裝置日期
function normDate(str) {
  // 優先匹配 年/月/日 或 年-月-日，只取月/日
  const full = str.match(/\d{4}[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (full) return `${parseInt(full[1])}/${parseInt(full[2])}`;
  // 退而求其次：直接是 月/日
  const md = str.match(/^(\d{1,2})[\/\-](\d{1,2})/);
  if (md) return `${parseInt(md[1])}/${parseInt(md[2])}`;
  return str;
}

function todayKey() {
  const d = new Date();
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function findTodayIndex() {
  const today = todayKey();
  const idx = allDays.findIndex(d => normDate(d.date) === today);
  return idx >= 0 ? idx : 0;
}

// ── localStorage 已拜訪記錄 ──
// key 格式：visited_YYYY-MM-DD，每天自動區隔
function storageKey() {
  const d = new Date();
  return `visited_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getVisited() {
  try {
    return JSON.parse(localStorage.getItem(storageKey()) || '[]');
  } catch { return []; }
}

function markVisited(id) {
  try {
    const v = getVisited();
    if (!v.includes(id)) { v.push(id); localStorage.setItem(storageKey(), JSON.stringify(v)); }
  } catch {}
}

function makeCardId(dayIdx, placeName) {
  return `d${dayIdx}_${placeName}`;
}

// ── 花費記錄（永久保存，不自動清除）──
function getExpenses() {
  try { return JSON.parse(localStorage.getItem('expenses_trip') || '{}'); } catch { return {}; }
}
function saveExpense(cardId, amount) {
  const data = getExpenses();
  if (amount === null) { delete data[cardId]; } else { data[cardId] = amount; }
  localStorage.setItem('expenses_trip', JSON.stringify(data));
}
function getExpense(cardId) {
  const data = getExpenses();
  return data[cardId] !== undefined ? data[cardId] : null;
}

// ── Modal ──
let _modalCardId = null;

function openExpenseModal(cardId, placeName) {
  _modalCardId = cardId;
  document.getElementById('modalPlaceName').textContent = placeName;
  const cur = getExpense(cardId);
  document.getElementById('expenseInput').value = cur !== null ? cur : '';
  document.getElementById('expenseModal').classList.add('show');
  setTimeout(() => document.getElementById('expenseInput').focus(), 150);
}
function closeModal() {
  document.getElementById('expenseModal').classList.remove('show');
  _modalCardId = null;
}
function confirmExpense() {
  if (!_modalCardId) return;
  const val = document.getElementById('expenseInput').value.trim();
  const amount = val === '' ? null : parseInt(val);
  saveExpense(_modalCardId, amount);
  closeModal();
  renderCards();
  updateTotalBadge();
  if (document.getElementById('summaryPanel').classList.contains('open')) renderSummary();
}
function clearExpense() {
  if (!_modalCardId) return;
  saveExpense(_modalCardId, null);
  closeModal();
  renderCards();
  updateTotalBadge();
  if (document.getElementById('summaryPanel').classList.contains('open')) renderSummary();
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('expenseModal').classList.contains('show')) return;
  if (e.key === 'Enter') confirmExpense();
  if (e.key === 'Escape') closeModal();
});
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('expenseModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  loadSheet();
});
function updateTotalBadge() {
  const expenses = getExpenses();
  const total = Object.values(expenses).reduce((s, v) => s + (v || 0), 0);
  const badge = document.getElementById('summaryTotalBadge');
  if (badge) badge.textContent = total > 0 ? `共 $${total.toLocaleString()}` : '';
}

// ── 花費總覽 ──
function toggleSummary() {
  const panel = document.getElementById('summaryPanel');
  const isOpen = panel.classList.toggle('open');
  if (isOpen) renderSummary();
}
function renderSummary() {
  const panel = document.getElementById('summaryPanel');
  const expenses = getExpenses();
  let grandTotal = 0;
  let copyText = '日期\t景點\t品項\t花費\n';

  let html = '<table><thead><tr><th>景點</th><th>品項</th><th>花費</th></tr></thead><tbody>';

  allDays.forEach((day, di) => {
    let dayTotal = 0;
    html += `<tr class="summary-day-row"><td colspan="3">📅 ${esc(day.date)}</td></tr>`;

    day.places.forEach(item => {
      const name = item.place || item.nav;
      const cardId = makeCardId(di, name);
      const exp = getExpense(cardId);
      if (exp !== null) { grandTotal += exp; dayTotal += exp; }
      const expStr = exp !== null ? `$${exp.toLocaleString()}` : '－';
      html += `<tr>
        <td>${esc(name)}</td>
        <td style="color:var(--text-light);font-size:12px">${esc(item.note || '')}</td>
        <td class="${exp !== null ? 'expense-val' : 'no-expense'}">${expStr}</td>
      </tr>`;
      copyText += `${day.date}\t${name}\t${item.note || ''}\t${exp !== null ? exp : ''}\n`;
    });
  });

  html += `<tr class="summary-total"><td colspan="2">🧾 總計</td><td>$${grandTotal.toLocaleString()}</td></tr>`;
  html += `</tbody></table>`;
  html += `<div class="summary-actions">
    <button class="summary-act-btn btn-copy" id="copyBtn" onclick="copySummary()">📋 複製表格</button>
    <button class="summary-act-btn btn-clear-all" onclick="clearAllExpenses()">🗑️ 清除全部</button>
  </div>`;

  panel.innerHTML = html;
  panel._copyText = copyText;
}
function copySummary() {
  const panel = document.getElementById('summaryPanel');
  navigator.clipboard.writeText(panel._copyText || '').then(() => {
    const btn = document.getElementById('copyBtn');
    if (btn) { btn.textContent = '✅ 已複製！'; setTimeout(() => btn.textContent = '📋 複製表格', 2000); }
  }).catch(() => alert('複製失敗，請手動選取內容'));
}
function clearAllExpenses() {
  if (!confirm('確定清除所有花費記錄？')) return;
  localStorage.removeItem('expenses_trip');
  renderCards();
  updateTotalBadge();
  renderSummary();
}

function buildMapsUrl(dest) {
  return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent((dest || '').trim())}&travelmode=driving`;
}
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  allDays.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === activeDay ? ' active' : '');
    btn.innerHTML = `<div>第 ${i+1} 天</div><div class="tab-date">${esc(day.date)}</div>`;
    btn.onclick = () => switchDay(i);
    tabs.appendChild(btn);
  });
}

function switchDay(idx) {
  activeDay = idx;
  renderTabs();
  renderCards();
}

function markCardVisitedUI(card) {
  card.classList.add('visited');
  if (!card.querySelector('.visited-check')) {
    const s = document.createElement('span');
    s.className = 'visited-check';
    s.textContent = '✓';
    card.appendChild(s);
  }
  const title = card.querySelector('.card-place');
  if (title) title.style.textDecoration = 'line-through';
}

function navigateToPlace(dest, cardId, card) {
  markVisited(cardId);
  if (card) markCardVisitedUI(card);
  window.open(buildMapsUrl(dest), '_blank', 'noopener');
}

function renderCards() {
  const content = document.getElementById('content');
  const day = allDays[activeDay];
  if (!day || day.places.length === 0) {
    content.innerHTML = '<div class="empty-msg"><span class="e">🗺️</span>這天沒有行程資料</div>';
    return;
  }
  content.innerHTML = '';
  const visited = getVisited();

  day.places.forEach((item, i) => {
    const dest        = item.nav || item.place;
    const displayName = item.place || item.nav;
    const cardId      = makeCardId(activeDay, displayName);
    const isVisited   = visited.includes(cardId);
    const expense     = getExpense(cardId);

    const card = document.createElement('div');
    card.className = 'place-card' + (isVisited ? ' visited' : '');
    card.style.animationDelay = `${i * 0.05}s`;

    card.innerHTML = `
      <div class="card-icon">${getIcon(displayName)}</div>
      <div class="card-body">
        <div class="card-place">${esc(displayName)}</div>
        ${item.note ? `<div class="card-note">📝 ${esc(item.note)}</div>` : ''}
        ${expense !== null ? `<div class="card-expense">${expense.toLocaleString()}</div>` : ''}
      </div>
      ${isVisited ? '<span class="visited-check">✓</span>' : ''}
      <div class="card-actions">
        <button class="card-action nav" type="button" title="導航">🧭</button>
        <button class="card-action expense" type="button" title="記帳">💰</button>
      </div>
    `;

    card.querySelector('.card-action.nav').addEventListener('click', () => {
      navigateToPlace(dest, cardId, card);
    });
    card.querySelector('.card-action.expense').addEventListener('click', () => {
      openExpenseModal(cardId, displayName);
    });

    content.appendChild(card);
  });
  updateTotalBadge();
}

async function loadSheet() {
  const sheetId = document.getElementById('sheetId').value.trim();
  const status  = document.getElementById('status');
  const tabs    = document.getElementById('dayTabs');
  const content = document.getElementById('content');

  if (!sheetId) {
    status.textContent = '請輸入試算表 ID';
    status.className = 'status error';
    return;
  }

  tabs.innerHTML = '<div class="day-tab skeleton">載入中...</div>';
  content.innerHTML = '';
  status.innerHTML = '<span class="spinner"></span>讀取行程資料中...';
  status.className = 'status loading';

  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('無法讀取試算表，請確認已設為公開');
    const text = await res.text();
    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!match) throw new Error('試算表回傳格式不正確，請確認工作表存在且已公開');
    const json = JSON.parse(match[1]);
    const rows = json.table.rows;

    if (!rows || rows.length < 2) throw new Error('試算表內沒有資料');

    const headerRow = rows[0];
    const dataRows  = rows.slice(1);

    allDays = [];

    DAY_COLS.forEach((cols) => {
      const dc = headerRow.c[cols.place];
      const dateVal = dc && dc.v ? String(dc.v).trim() : '';
      if (!dateVal) return;

      const places = [];
      dataRows.forEach(row => {
        const pc = row.c?.[cols.place];
        const nc = row.c?.[cols.nav];
        const tc = row.c?.[cols.note];
        const place = pc?.v ? String(pc.v).trim() : '';
        const nav   = nc?.v ? String(nc.v).trim() : '';
        const note  = tc?.v ? String(tc.v).trim() : '';
        if (place || nav) places.push({ place, nav, note });
      });

      allDays.push({ date: dateVal, places });
    });

    if (allDays.length === 0) throw new Error('找不到任何行程資料');

    activeDay = findTodayIndex(); // 自動對應當日，找不到則預設第一天
    let total = allDays.reduce((s, d) => s + d.places.length, 0);
    status.textContent = `✅ 已載入 ${allDays.length} 天、${total} 個地點`;
    status.className = 'status';

    renderTabs();
    renderCards();

  } catch(e) {
    status.textContent = `❌ ${e.message}`;
    status.className = 'status error';
    tabs.innerHTML = '';
  }
}
